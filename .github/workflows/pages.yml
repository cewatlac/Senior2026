name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -e
          test -f index.html
          test -f topics.html
          test -f videos.html
          test -f about.html
          test -f roadmap.html
          test -f 404.html
          test -f .nojekyll
          test -d assets
          if [ ! -d tutorials ] && [ ! -d learn ]; then
            echo "Error: expected tutorials/ or learn/ folder to exist."
            exit 1
          fi
          echo "Required static site files exist."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
