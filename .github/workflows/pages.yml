name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static site
        run: |
          echo "Validating required files..."
          test -f index.html
          test -f topics.html
          test -f videos.html
          test -f about.html
          test -f roadmap.html
          test -f 404.html
          test -d assets
          test -d tutorials || test -d learn
          node tools/validate-links.js
          echo "Required files exist and portal validation passed."

      - name: Ensure Pages is enabled
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${REPOSITORY}/pages"
          auth_token="${PAGES_ADMIN_TOKEN:-$GITHUB_TOKEN}"

          status="$(curl -sS -o /tmp/pages-site.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${auth_token}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api_url}")"

          if [ "${status}" = "200" ]; then
            echo "GitHub Pages is already enabled."
            exit 0
          fi

          if [ "${status}" != "404" ]; then
            cat /tmp/pages-site.json
            echo "::error::Could not inspect GitHub Pages status. API returned HTTP ${status}."
            exit 1
          fi

          if [ -z "${PAGES_ADMIN_TOKEN:-}" ]; then
            echo "::error::GitHub Pages is not enabled for this repository. Enable it once from Settings > Pages > Build and deployment > Source: GitHub Actions, then rerun this workflow. Alternatively, add a repository secret named PAGES_ADMIN_TOKEN with Pages/admin permission so the workflow can enable Pages automatically."
            exit 1
          fi

          create_status="$(curl -sS -o /tmp/pages-create.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PAGES_ADMIN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"build_type":"workflow"}' \
            "${api_url}")"

          if [ "${create_status}" = "201" ] || [ "${create_status}" = "409" ]; then
            echo "GitHub Pages is enabled for GitHub Actions."
            exit 0
          fi

          cat /tmp/pages-create.json
          echo "::error::Could not enable GitHub Pages automatically. API returned HTTP ${create_status}."
          exit 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
